<!-- Title: Cerivitas Websites
Author: Max
Icon: 🌐
Desc: Agent Adventure Coding Workshop - Hasil website peserta -->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Adventure — Coding Workshop 🚀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#0f0f23; --card-bg:#1a1a3e; --text:#e0e0ff; --accent:#ffd700; --accent2:#7ec8e3; --border:rgba(255,255,255,0.06); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:900px; margin:0 auto; padding:2rem 1.5rem 4rem; }
h1 { font-size:2.2rem; font-weight:800; background:linear-gradient(135deg,var(--accent),#ff7eb3); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; margin-bottom:0.3rem; }
.subtitle { color:#888; font-size:0.85rem; margin-bottom:1.5rem; }
.search-box { width:100%; padding:0.6rem 1rem; border-radius:10px; background:var(--card-bg); border:1px solid var(--border); color:var(--text); font-family:'Inter',sans-serif; font-size:0.9rem; margin-bottom:1.5rem; outline:none; }
.search-box:focus { border-color:var(--accent2); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }
.card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; padding:1.2rem; cursor:pointer; transition:0.3s; position:relative; overflow:hidden; text-decoration:none; color:var(--text); }
.card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 30px rgba(255,215,0,0.1); }
.card-icon { font-size:1.8rem; margin-bottom:0.5rem; }
.card-title { font-weight:700; font-size:1rem; margin-bottom:0.2rem; }
.card-author { color:#888; font-size:0.8rem; }
.card-desc { color:#666; font-size:0.75rem; margin-top:0.3rem; line-height:1.4; }
.card-link { margin-top:0.5rem; font-size:0.7rem; color:#555; }
.card:hover .card-link { color:var(--accent); }
#loading { text-align:center; padding:4rem 0; color:#888; }
.footer { text-align:center; margin-top:3rem; color:#444; font-size:0.75rem; }
.count { color:#666; font-size:0.8rem; margin-bottom:1rem; }
</style>
</head>
<body>
<div class="container">
  <h1>🌐 Coding Workshop</h1>
  <p class="subtitle">Agent Adventure Summer 2026 — Cerivitas</p>
  <input class="search-box" id="search" placeholder="🔍 Cari website..." oninput="filter()">
  <div class="count" id="count">Memuat...</div>
  <div id="loading">Memuat...</div>
  <div class="grid" id="grid"></div>
  <p class="footer">Dibuat dengan ❤️ oleh peserta workshop</p>
</div>
<script>
const REPO = 'sarinursita/cerivitas-websites';
const RAW = 'https://raw.githubusercontent.com/' + REPO + '/main/';
const COLORS = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0','#ee5a24','#0abde3','#10ac84','#ff6348'];
const ICONS = ['🌐','🚀','🎨','💻','🎮','📱','⚡','🌟','🎯','💡','🔥','🌈'];

async function loadWebsites() {
  const resp = await fetch('https://api.github.com/repos/' + REPO + '/contents/');
  const items = await resp.json();
  const htmlFiles = items.filter(i => i.type==='file' && i.name.endsWith('.html') && i.name!=='index.html');

  const websites = [];
  for (const [i, f] of htmlFiles.entries()) {
    let meta = { file: f.name, title: '', author: '', icon: ICONS[i % ICONS.length], desc: '' };

    // Try to fetch and parse metadata comment
    try {
      const content = await fetch(RAW + f.name);
      const text = await content.text();
      // Parse <!-- ... --> block at the start
      const commentMatch = text.match(/<!--([\s\S]*?)-->/);
      if (commentMatch) {
        const lines = commentMatch[1].split('\n').map(l => l.trim()).filter(Boolean);
        lines.forEach(l => {
          const [, key, val] = l.match(/^(\w+):\s*(.+)$/) || [];
          if (key === 'Title') meta.title = val;
          if (key === 'Author') meta.author = val;
          if (key === 'Icon') meta.icon = val;
          if (key === 'Desc') meta.desc = val;
        });
      }
    } catch(e) {}

    // Fallback: generate name from filename
    if (!meta.title) {
      meta.title = f.name.replace('.html','').split('-').map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
    }
    websites.push(meta);
  }

  return websites;
}

let websites = [];
async function init() {
  websites = await loadWebsites();
  document.getElementById('loading').style.display = 'none';
  filter();
}
init();

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  const filtered = websites.filter(w =>
    w.title.toLowerCase().includes(q) ||
    w.author.toLowerCase().includes(q) ||
    w.desc.toLowerCase().includes(q)
  );

  grid.innerHTML = filtered.map((w,i) => {
    const color = COLORS[i % COLORS.length];
    return `<a class="card" href="${w.file}">
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${color};border-radius:14px 14px 0 0"></div>
      <div style="padding-top:0.3rem">
        <div class="card-icon">${w.icon}</div>
        <div class="card-title">${w.title}</div>
        ${w.author ? `<div class="card-author">oleh ${w.author}</div>` : ''}
        ${w.desc ? `<div class="card-desc">${w.desc}</div>` : ''}
        <div class="card-link">🌐 Lihat website →</div>
      </div>
    </a>`;
  }).join('');

  document.getElementById('count').textContent = `${filtered.length} website`;
}
</script>
</body>
</html>
